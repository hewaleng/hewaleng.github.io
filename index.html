<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hewaleng的小窝 🐱</title>
    <!-- 可爱字体引入 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 软萌奶油黄+薄荷绿配色 */
        :root {
            --primary: #FFEAA7; /* 奶油黄主色 */
            --secondary: #D1F8EF; /* 薄荷绿次色 */
            --bg: #FFFDF5; /* 奶白背景 */
            --text: #5A4A3F; /* 暖棕文字 */
            --shadow: rgba(255, 234, 167, 0.3); /* 柔和阴影 */
        }
        body {
            background-color: var(--bg);
            /* 可爱背景图（可替换） */
            background-image: url('https://picsum.photos/id/106/1920/1080');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            min-height: 100vh;
            padding: 30px 20px;
            font-family: "Noto Sans SC", sans-serif;
        }
        /* 导航栏 */
        .navbar {
            max-width: 800px;
            margin: 0 auto 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
            background: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
        }
        .navbar a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 15px;
            transition: all 0.3s;
        }
        .navbar a:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }
        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.9);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 24px var(--shadow);
            backdrop-filter: blur(8px);
        }
        /* 可爱标题字体 */
        h1 {
            color: #FFB74D; /* 暖黄标题 */
            font-family: "Ma Shan Zheng", cursive;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #8A776E;
            margin-bottom: 40px;
        }
        .content {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            text-indent: 2em;
        }
        .btn {
            display: block;
            width: fit-content;
            margin: 0 auto 20px;
            padding: 12px 32px;
            background-color: var(--secondary);
            color: var(--text);
            border-radius: 25px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #A5EAD7;
            transform: translateY(-3px);
            box-shadow: 0 4px 12px var(--shadow);
        }
        /* 猫咪鼠标跟随 */
        .cat-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 60px;
            height: 60px;
            transition: transform 0.1s ease;
        }
        /* 猫咪漂浮动画 */
        .floating-cat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            animation: float 3s ease-in-out infinite;
            z-index: 9998;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        /* 音乐播放器 */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 15px 20px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 9997;
        }
        .music-player button {
            background: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 猫咪鼠标跟随 -->
    <img src="https://picsum.photos/id/40/60/60" alt="猫咪" class="cat-cursor" id="catCursor">
    <!-- 漂浮猫咪动画 -->
    <img src="https://picsum.photos/id/237/80/80" alt="猫咪" class="floating-cat">

    <!-- 导航栏 -->
    <div class="navbar">
        <a href="index.html">首页</a>
        <a href="blog.html">博客文章</a>
        <a href="about.html">关于我</a>
        <a href=" https://v.douyin.com/zTaKo7f_fME/ 8@8.com :7pm" class="btn" style="background:#FF99CC;color:white;" target="_blank">
🎀 我的抖音
</a>
    </div>

    <!-- 主内容 -->
    <div class="container">
        <h1>🐱 Hewaleng的小窝 🐱</h1>
        <p class="subtitle">记录生活 | 学习笔记 | 可爱日常 ✨</p>
        
        <div class="content">
            <p>哈喽大家好！这里是Hewaleng的个人博客~</p>
            <p>欢迎常来玩呀🥰</p>
        </div>

        <a href="blog.html" class="btn">查看我的博客文章</a>
    </div>

    <!-- 音乐播放器 -->
    <div class="music-player">
        <audio id="bgMusic" loop preload="auto">
            <source src="https://music.163.com/song/media/outer/url?id=1334432833.mp3" type="audio/mpeg">
        
        <button id="playBtn">🎵 播放背景音乐</button>
    </div>

    <script>
        // 猫咪鼠标跟随
        const cat = document.getElementById('catCursor');
        document.addEventListener('mousemove', (e) => {
            cat.style.left = e.clientX + 10 + 'px';
            cat.style.top = e.clientY + 10 + 'px';
        });

        // 音乐播放器控制
        const music = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                playBtn.textContent = '⏸️ 暂停背景音乐';
            } else {
                music.pause();
                playBtn.textContent = '🎵 播放背景音乐';
            }
        });
    </script>
</body>
</html>
