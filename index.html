<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hewaleng的小窝 🐱</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --primary: #FFEAA7;
            --secondary: #D1F8EF;
            --bg: #FFFDF5;
            --text: #5A4A3F;
            --shadow: rgba(255, 234, 167, 0.3);
        }
        html, body {
            width: 100%;
            overflow-x: hidden;
        }
        body {
            background-color: var(--bg);
            background-image: url('https://picsum.photos/id/106/1920/1080');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            min-height: 100vh;
            padding: 20px 15px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .navbar {
            max-width: 800px;
            margin: 0 auto 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: rgba(255,255,255,0.85);
            padding: 12px;
            border-radius: 18px;
            backdrop-filter: blur(8px);
        }
        .navbar a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 15px;
            transition: all 0.3s;
            text-align: center;
        }
        .navbar a:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.92);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px var(--shadow);
            backdrop-filter: blur(8px);
        }
        h1 {
            color: #FFB74D;
            font-family: "Ma Shan Zheng", cursive;
            font-size: clamp(2rem, 8vw, 3rem);
            text-align: center;
            margin-bottom: 15px;
        }
        .subtitle {
            text-align: center;
            font-size: 1rem;
            color: #8A776E;
            margin-bottom: 25px;
        }
        .content {
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 25px;
            text-indent: 2em;
        }
        .btn {
            display: block;
            width: fit-content;
            margin: 0 auto 20px;
            padding: 12px 28px;
            background-color: var(--secondary);
            color: var(--text);
            border-radius: 25px;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #A5EAD7;
            transform: translateY(-3px);
            box-shadow: 0 4px 12px var(--shadow);
        }
        .cat-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 50px;
            height: 50px;
            transition: transform 0.1s ease;
            display: none;
        }
        @media (min-width: 768px) {
            .cat-cursor { display: block; }
        }
        .floating-cat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            animation: float 3s ease-in-out infinite;
            z-index: 9998;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 12px 16px;
            border-radius: 18px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 9997;
        }
        .music-player button {
            background: var(--primary);
            border: none;
            padding: 8px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        /* 游戏打击动画 */
        @keyframes boom {
            to { transform:scale(1.5); opacity:0; }
        }

        /* 🔥 精美奖励弹窗 */
        .toast {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: white;
            padding: 18px 28px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            z-index: 99999;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .toast-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<img src="https://picsum.photos/id/40/60/60" alt="猫咪" class="cat-cursor" id="catCursor">
<img src="https://picsum.photos/id/237/80/80" alt="猫咪" class="floating-cat">

<div class="navbar">
    <a href="index.html">首页</a>
    <a href="blog.html">博客文章</a>
    <a href="about.html">关于我</a>
    <a href="https://v.douyin.com/zTaKo7f_fME/" target="_blank" style="background:#FF99CC;color:white;">🎀 我的抖音</a>
</div>

<div class="container">
    <h1>🐱 Hewaleng的小窝 🐱</h1>
    <p class="subtitle">记录生活 | 学习笔记 | 可爱日常 ✨</p>
    <div class="content">
        <p>哈喽大家好！这里是Hewaleng的个人博客~</p>
        <p>欢迎常来玩呀🥰</p>
    </div>
    <a href="blog.html" class="btn">查看我的博客文章</a>
</div>

<!-- 音乐 -->
<div class="music-player">
    <audio id="bgMusic" loop preload="auto">
        <source src="https://music.163.com/song/media/outer/url?id=1334432833.mp3" type="audio/mpeg">
    </audio>
    <button id="playBtn">🎵 播放背景音乐</button>
</div>

<!-- 🔥 全局精美弹窗 -->
<div id="toast" class="toast">
    <div class="toast-icon" id="toastIcon">✨</div>
    <div id="toastText">提示</div>
</div>

<!-- ====================== 小猫幻想乡 · 双端完美版 ====================== -->
<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; background: rgba(255,252,245,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; font-family: Arial, sans-serif;" id="gameContainer">
  <h2 style="color: #FFB74D; font-family: 'Ma Shan Zheng', cursive; font-size: 26px; margin: 10px 0;">🐱 小猫幻想乡 🐱</h2>

  <!-- 主菜单 -->
  <div id="mainMenu" style="width: 90%; max-width: 400px; text-align: center; margin-bottom:10px; display:none;">
    <button onclick="showLevelSelect()" style="width:100%; padding:12px; border-radius:12px; border:none; background:#FFEAA7; font-weight:bold; margin:5px 0; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">开始游戏</button>
    <button onclick="showInventory()" style="width:100%; padding:12px; border-radius:12px; border:none; background:#D1F8EF; font-weight:bold; margin:5px 0; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">小猫仓库</button>
  </div>

  <!-- 关卡选择 -->
  <div id="levelSelect" style="width: 90%; max-width: 400px; text-align: center; margin-bottom:10px; display:none;">
    <p style="font-size:16px; color:#5A4A3F; margin:6px 0;">选择关卡</p>
    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap:6px; margin-top:8px;">
      <button onclick="startGame(1)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">1</button>
      <button onclick="startGame(2)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">2</button>
      <button onclick="startGame(3)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">3</button>
      <button onclick="startGame(4)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">4</button>
      <button onclick="startGame(5)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">5</button>
      <button onclick="startGame(6)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">6</button>
      <button onclick="startGame(7)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">7</button>
      <button onclick="startGame(8)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">8</button>
      <button onclick="startGame(9)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">9</button>
      <button onclick="startGame(10)" style="aspect-ratio:1; border-radius:10px; border:none; background:#FFEAA7; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">10</button>
    </div>
    <button onclick="showMainMenu()" style="margin-top:10px; padding:8px 16px; border-radius:10px; border:none; background:#FFB74D; color:white; font-weight:bold; cursor:pointer;">返回</button>
  </div>

  <!-- 小猫仓库 -->
  <div id="inventory" style="width:90%; max-width:400px; height:70vh; background:#FFF8E0; border-radius:16px; border:3px solid #FFB74D; display:none; flex-direction:column; align-items:center; padding:10px; overflow-y:auto;">
    <h3 style="color:#FFB74D; margin:8px 0;">🐾 小猫仓库</h3>
    <div id="catCollection" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; width:100%;"></div>
    <button onclick="showMainMenu()" style="margin-top:10px; padding:8px 16px; border-radius:10px; border:none; background:#FFB74D; color:white; font-weight:bold; cursor:pointer;">返回</button>
  </div>

  <!-- 游戏区域 -->
  <div id="gameArea" style="width:90%; max-width:400px; height:70vh; background:#D1F8EF; position:relative; overflow:hidden; border-radius:16px; border:3px solid #FFEAA7; display:none;">
    <div id="player" style="width:45px; height:45px; background:url('https://picsum.photos/id/40/50/50'); background-size:cover; position:absolute; bottom:40px; left:45%; transition:0.05s;"></div>
    <div id="gameUI" style="position:absolute; top:8px; left:10px; font-size:14px; font-weight:bold; color:#5A4A3F; z-index:999;">关卡：<span id="level">1</span>｜生命：<span id="hp">3</span>｜得分：<span id="score">0</span></div>
  </div>

  <!-- 触屏控制 -->
  <div id="touchControls" style="width:90%; max-width:400px; display:none; justify-content:space-between; margin-top:10px;">
    <button id="leftBtn" style="width:48%; height:50px; border:none; border-radius:14px; background:#FFEAA7; font-size:18px; font-weight:bold; transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">◀️ 左</button>
    <button id="rightBtn" style="width:48%; height:50px; border:none; border-radius:14px; background:#FFEAA7; font-size:18px; font-weight:bold; transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">右 ▶️</button>
  </div>

  <!-- 奖励界面 -->
  <div id="rewardScreen" style="width:90%; max-width:400px; height:70vh; background:#FFF8E0; border-radius:16px; border:3px solid #FFB74D; display:none; flex-direction:column; align-items:center; justify-content:center; color:#5A4A3F; text-align:center;">
    <h2 style="color:#FFB74D; font-size:24px;">🎉 关卡胜利！</h2>
    <p style="font-size:16px;">获得新小猫</p>
    <img id="rewardCatImg" style="width:110px; height:110px; border-radius:50%; border:4px solid #FFEAA7; margin:10px 0;">
    <p style="font-size:18px; font-weight:bold;">名称：<span id="rewardCatName" style="color:#FF6B6F;"></span></p>
    <button onclick="continueToNext()" style="padding:10px 24px; background:#FFB74D; border:none; border-radius:14px; color:white; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">继续冒险</button>
  </div>

  <button onclick="closeTouhouGame()" style="margin-top:10px; padding:8px 20px; background:#FFB74D; border:none; border-radius:14px; color:white; font-weight:bold; cursor:pointer; transition:0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">关闭游戏</button>
</div>

<!-- 游戏入口 -->
<button onclick="startTouhouGame()" style="position: fixed; top:10px; right:10px; background:#D1F8EF; border:2px solid #FFEAA7; padding:10px 16px; border-radius:20px; color:#5A4A3F; font-weight:bold; cursor:pointer; z-index:10; font-size:14px;">🎮 小猫幻想乡</button>

<script>
    // 鼠标猫咪
    const cat = document.getElementById('catCursor');
    document.addEventListener('mousemove', (e) => {
        cat.style.left = e.clientX + 10 + 'px';
        cat.style.top = e.clientY + 10 + 'px';
    });

    // 音乐
    const music = document.getElementById('bgMusic');
    const playBtn = document.getElementById('playBtn');
    playBtn.addEventListener('click', () => {
        if (music.paused) {
            music.play();
            playBtn.textContent = '⏸️ 暂停背景音乐';
        } else {
            music.pause();
            playBtn.textContent = '🎵 播放背景音乐';
        }
    });

    // 🔥 精美弹窗函数
    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toastIcon');
    const toastText = document.getElementById('toastText');
    let toastTimer;

    function showToast(icon, text, duration = 1500) {
        toastIcon.textContent = icon;
        toastText.textContent = text;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    // ====================== 游戏核心 ======================
    let gameRunning = false;
    let playerLeft = 45;
    const speed = 8;
    let score = 0;
    let level = 1;
    let hp = 3;
    let hasGun = false;
    let gameLoop;
    let bullets = [];
    let items = [];
    let shots = [];

    const catRewards = [
      { name:"初心小猫", img:"https://picsum.photos/id/40/120/120" },
      { name:"勇敢小猫", img:"https://picsum.photos/id/237/120/120" },
      { name:"三花小猫", img:"https://picsum.photos/id/64/120/120" },
      { name:"治愈小猫", img:"https://picsum.photos/id/1025/120/120" },
      { name:"星光小猫", img:"https://picsum.photos/id/1062/120/120" },
      { name:"彩虹小猫", img:"https://picsum.photos/id/1074/120/120" },
      { name:"忍者小猫", img:"https://picsum.photos/id/169/120/120" },
      { name:"天使小猫", img:"https://picsum.photos/id/200/120/120" },
      { name:"神龙小猫", img:"https://picsum.photos/id/306/120/120" },
      { name:"幻想小猫", img:"https://picsum.photos/id/433/120/120" }
    ];

    let unlockedCats = JSON.parse(localStorage.getItem('unlockedCats')) || [];
    const player = document.getElementById('player');
    const gameArea = document.getElementById('gameArea');
    const touchControls = document.getElementById('touchControls');
    const levelSelect = document.getElementById('levelSelect');
    const rewardScreen = document.getElementById('rewardScreen');
    const mainMenu = document.getElementById('mainMenu');
    const inventory = document.getElementById('inventory');
    let leftBtn = document.getElementById('leftBtn');
    let rightBtn = document.getElementById('rightBtn');
    let touchingLeft = false;
    let touchingRight = false;
    let keys = { ArrowLeft: false, ArrowRight: false };

    // 触屏
    leftBtn.addEventListener('touchstart',(e)=>{e.preventDefault(); touchingLeft=true});
    leftBtn.addEventListener('touchend',(e)=>{e.preventDefault(); touchingLeft=false});
    rightBtn.addEventListener('touchstart',(e)=>{e.preventDefault(); touchingRight=true});
    rightBtn.addEventListener('touchend',(e)=>{e.preventDefault(); touchingRight=false});

    // 键盘
    document.addEventListener('keydown',(e)=>{
      if(e.key==='ArrowLeft') keys.ArrowLeft=true;
      if(e.key==='ArrowRight') keys.ArrowRight=true;
    });
    document.addEventListener('keyup',(e)=>{
      if(e.key==='ArrowLeft') keys.ArrowLeft=false;
      if(e.key==='ArrowRight') keys.ArrowRight=false;
    });

    const levelData = [
      { speed:6, rate:0.06 },{ speed:7, rate:0.08 },{ speed:8, rate:0.10 },
      { speed:9, rate:0.12 },{ speed:10, rate:0.14 },{ speed:11, rate:0.16 },
      { speed:12, rate:0.18 },{ speed:13, rate:0.20 },{ speed:14, rate:0.22 },
      { speed:15, rate:0.25 }
    ];

    // 界面切换
    function startTouhouGame(){
      gameContainer.style.display='flex';
      showMainMenu();
    }
    function showMainMenu(){
      mainMenu.style.display='block';
      levelSelect.style.display='none';
      inventory.style.display='none';
      gameArea.style.display='none';
      touchControls.style.display='none';
      rewardScreen.style.display='none';
    }
    function showLevelSelect(){
      mainMenu.style.display='none';
      levelSelect.style.display='block';
    }
    function showInventory(){
      renderInventory();
      mainMenu.style.display='none';
      inventory.style.display='flex';
    }
    function renderInventory(){
      const box = document.getElementById('catCollection');
      box.innerHTML = '';
      catRewards.forEach((cat,i)=>{
        let div = document.createElement('div');
        div.style.cssText = 'display:flex; flex-direction:column; align-items:center; background:white; padding:6px; border-radius:8px;';
        let img = document.createElement('img');
        img.src = cat.img;
        img.style.width='50px';
        img.style.height='50px';
        img.style.borderRadius='50%';
        let name = document.createElement('span');
        name.style.fontSize='12px';
        name.innerText = unlockedCats.includes(i+1) ? cat.name : '???';
        div.appendChild(img);
        div.appendChild(name);
        box.appendChild(div);
      });
    }

    // 开始游戏
    function startGame(lv){
      level=lv; playerLeft=45; score=0; hp=3; hasGun=false;
      bullets=[]; items=[]; shots=[]; gameRunning=true;
      levelSelect.style.display='none';
      gameArea.style.display='block';
      touchControls.style.display='flex';
      updateUI();
      gameLoop=setInterval(gameUpdate,20);
    }

    // 游戏循环
    function gameUpdate(){
      if(!gameRunning) return;

      // 移动
      if((touchingLeft || keys.ArrowLeft) && playerLeft>0) playerLeft-=speed;
      if((touchingRight || keys.ArrowRight) && playerLeft<90) playerLeft+=speed;
      player.style.left = playerLeft+'%';

      if(hasGun && Math.random()<0.15) shoot();

      let cfg=levelData[level-1];
      if(Math.random()<cfg.rate) createBullet(cfg.speed);
      if(Math.random()<0.012) createItem();

      // 弹幕
      for(let i=bullets.length-1; i>=0; i--){
        let b=bullets[i]; b.top+=b.speed; b.el.style.top=b.top+'px';
        if(b.top>gameArea.clientHeight-80 &&
           b.left>playerLeft*gameArea.clientWidth/100-30 &&
           b.left<playerLeft*gameArea.clientWidth/100+30) { hitBullet(i); break; }
        if(b.top>gameArea.clientHeight) {
          b.el.remove(); bullets.splice(i,1); score++; updateUI();
          if(score>=level*40) levelComplete();
        }
      }

      // 射击
      for(let i=shots.length-1; i>=0; i--){
        let s=shots[i]; s.top-=7; s.el.style.top=s.top+'px';
        for(let j=bullets.length-1; j>=0; j--){
          let b=bullets[j];
          if(Math.abs(s.left-b.left)<20 && Math.abs(s.top-b.top)<20){
            createHitEffect(b.left,b.top);
            b.el.remove(); s.el.remove(); bullets.splice(j,1); shots.splice(i,1); score+=5; updateUI(); break;
          }
        }
        if(s.top<0) { s.el.remove(); shots.splice(i,1); }
      }

      // 道具
      for(let i=items.length-1; i>=0; i--){
        let it=items[i]; it.top+=4.5; it.el.style.top=it.top+'px';
        let cx=playerLeft*gameArea.clientWidth/100+22;
        if(it.top>gameArea.clientHeight-70 && Math.abs(it.left-cx)<38){
          getItem(it.type); it.el.remove(); items.splice(i,1);
        }
        if(it.top>gameArea.clientHeight) { it.el.remove(); items.splice(i,1); }
      }
    }

    // 射击
    function shoot(){
      let x=playerLeft*gameArea.clientWidth/100+20;
      let s=document.createElement('div');
      s.style.cssText='width:6px; height:14px; background:#64B5F6; border-radius:3px; position:absolute; top:'+(gameArea.clientHeight-60)+'px; left:'+x+'px;';
      gameArea.appendChild(s);
      shots.push({el:s, top:gameArea.clientHeight-60, left:x});
    }

    // 弹幕
    function createBullet(sp){
      let l=Math.random()*(gameArea.clientWidth-14);
      let b=document.createElement('div');
      b.style.cssText=`width:14px; height:14px; background:#FF9EB1; border-radius:50%; position:absolute; top:0; left:${l}px;`;
      gameArea.appendChild(b);
      bullets.push({el:b, top:0, left:l, speed:sp});
    }

    // 三花猫掉落道具
    function createItem(){
      let ty=['hp','star','gun'][Math.floor(Math.random()*3)];
      let l=Math.random()*(gameArea.clientWidth-22);
      let it=document.createElement('div');
      it.style.background = 'url(https://picsum.photos/id/64/40/40)';
      it.style.backgroundSize = 'cover';
      it.style.cssText += 'width:26px; height:26px; border-radius:50%; position:absolute; top:0; left:'+l+'px; box-shadow:0 0 8px #FFEAA7;';
      gameArea.appendChild(it);
      items.push({el:it, top:0, left:l, type:ty});
    }

    // 打击特效
    function createHitEffect(x,y){
      let ef=document.createElement('div');
      ef.style.cssText='width:20px; height:20px; background:#FF6B6F; border-radius:50%; position:absolute; top:'+y+'px; left:'+x+'px; animation:boom 0.3s forwards;';
      gameArea.appendChild(ef);
      setTimeout(()=>ef.remove(),300);
    }

    // 🔥 获得道具（生动弹窗）
    function getItem(t){
      if(t==='hp'){
        hp=Math.min(3,hp+1);
        showToast('❤️','生命恢复！');
      }
      if(t==='star'){
        score+=15;
        showToast('⭐','得分+15！');
      }
      if(t==='gun'){
        hasGun=true;
        showToast('🔫','获得武器！');
      }
      updateUI();
    }

    // 🔥 被击中（生动弹窗）
    function hitBullet(i){
      bullets[i].el.remove(); bullets.splice(i,1);
      hp--; updateUI();
      player.style.filter='brightness(1.6)';
      setTimeout(()=>player.style.filter='',300);
      
      showToast('💥','受到伤害！');
      
      if(hp<=0){
        showToast('🐱','游戏结束！返回菜单',2500);
        setTimeout(() => {
          gameRunning = false;
          clearInterval(gameLoop);
          // 清空所有元素
          bullets.forEach(b=>b.el.remove());
          items.forEach(it=>it.el.remove());
          shots.forEach(s=>s.el.remove());
          // 返回主菜单
          showMainMenu();
        }, 2000);
      }
    }

    // 关卡完成
    function levelComplete(){
      gameRunning=false; clearInterval(gameLoop);
      gameArea.style.display='none'; touchControls.style.display='none';
      rewardScreen.style.display='flex';
      let cat=catRewards[level-1];
      document.getElementById('rewardCatImg').src=cat.img;
      document.getElementById('rewardCatName').innerText=cat.name;
      if(!unlockedCats.includes(level)){
        unlockedCats.push(level);
        localStorage.setItem('unlockedCats',JSON.stringify(unlockedCats));
      }
    }

    // 继续
    function continueToNext(){
      if(level<10) startGame(level+1);
      else startGame(10);
    }

    // 关闭游戏
    function closeTouhouGame(){
      clearInterval(gameLoop); gameRunning=false;
      gameContainer.style.display='none';
      bullets.forEach(b=>b.el.remove());
      items.forEach(it=>it.el.remove());
      shots.forEach(s=>s.el.remove());
    }

    // UI更新
    function updateUI(){
      document.getElementById('level').innerText=level;
      document.getElementById('hp').innerText=hp;
      document.getElementById('score').innerText=score;
    }
</script>
</body>
</html>
